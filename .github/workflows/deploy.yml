name: Deploy Neurahear Site

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
      
      - name: Build static site
        run: npm run build
      
      - name: Create deployment package
        run: |
          # Include static files, server script, and package info
          tar -czf site.tar.gz out static-server.js package.json package-lock.json
      
      - name: Transfer site files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "site.tar.gz"
          target: "/tmp/"
      
      - name: Extract and update backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e

            echo "=== DEBUG: Current user info ==="
            whoami
            id
            groups
            echo "=== DEBUG: Directory permissions ==="
            ls -ld /var/www/neurahear /var/www/labsite

            STATIC_ROOT="/var/www/neurahear"
            LABSITE_ROOT="/var/www/labsite"
            PERSIST_DATA_SUBPATH="tools/digit-in-noise-test/data"
            DIN_DATA_DIR="/opt/neurahear/din-data"
            DIN_BACKUP_DIR="$LABSITE_ROOT/backups/din-data"

            echo "=== DIN data safety guard ==="
            if [ ! -d "$DIN_DATA_DIR" ]; then
              echo "ERROR: Expected DIN data directory is missing: $DIN_DATA_DIR"
              echo "Refusing to deploy until production DATA_DIR is migrated and verified."
              exit 1
            fi
            if [ ! -f "$DIN_DATA_DIR/users.json" ] || [ ! -f "$DIN_DATA_DIR/results.jsonl" ]; then
              echo "ERROR: DIN data files are incomplete in $DIN_DATA_DIR"
              ls -la "$DIN_DATA_DIR"
              exit 1
            fi
            mkdir -p "$DIN_BACKUP_DIR"
            PREDEPLOY_BACKUP="$DIN_BACKUP_DIR/din-data-predeploy-$(date +%Y%m%d_%H%M%S).tar.gz"
            tar -czf "$PREDEPLOY_BACKUP" -C "$(dirname "$DIN_DATA_DIR")" "$(basename "$DIN_DATA_DIR")"
            find "$DIN_BACKUP_DIR" -name "din-data-predeploy-*.tar.gz" -mtime +30 -delete
            echo "DIN pre-deploy backup created: $PREDEPLOY_BACKUP"

            echo "=== Extracting files to temp ==="
            TEMP_DIR=$(mktemp -d /tmp/neurahear-static-XXXX)
            tar -xzf /tmp/site.tar.gz -C "$TEMP_DIR"
            rm -f /tmp/site.tar.gz

            echo "=== Ensuring persistent data directory exists ==="
            mkdir -p "$STATIC_ROOT/$PERSIST_DATA_SUBPATH"
            # Ensure server storage exists for Zhanan page
            mkdir -p "$STATIC_ROOT/server-storage/data"
            mkdir -p "$STATIC_ROOT/server-storage/uploads"
            chmod -R 777 "$STATIC_ROOT/server-storage"

            echo "=== Syncing site files (preserving data directories) ==="
            # Sync static files to out/ directory if they were at root in tar
            # But now tar structure is: out/, static-server.js, package.json
            
            # 1. Copy static-server.js and package.json to root
            cp "$TEMP_DIR/static-server.js" "$STATIC_ROOT/"
            cp "$TEMP_DIR/package.json" "$STATIC_ROOT/"
            cp "$TEMP_DIR/package-lock.json" "$STATIC_ROOT/"
            
            # 2. Sync out/ directory
            rsync -av --delete --exclude="$PERSIST_DATA_SUBPATH/**" "$TEMP_DIR/out/" "$STATIC_ROOT/out/"

            echo "=== Restoring data directory (if needed) ==="
            mkdir -p "$STATIC_ROOT/out/$PERSIST_DATA_SUBPATH"

            echo "=== Cleaning up temp directory ==="
            rm -rf "$TEMP_DIR"

            echo "=== Installing server dependencies ==="
            cd "$STATIC_ROOT"
            npm ci --omit=dev

            echo "=== Restarting Neurahear Server ==="
            # Start/Restart the static-server which serves both UI and API
            pm2 restart neurahear || pm2 start static-server.js --name neurahear
            pm2 save

            echo "=== Updating backend code ==="
            cd "$LABSITE_ROOT"
            git fetch origin main
            git pull --ff-only origin main

            cd server/din-backend
            if [ ! -f .env ] || ! grep -q "/opt/neurahear/din-data" .env; then
              echo "ERROR: server/din-backend/.env must set DATA_DIR=/opt/neurahear/din-data"
              exit 1
            fi
            npm ci --omit=dev

            echo "=== Restarting backend service ==="
            pm2 restart din-backend || pm2 start server.js --name din-backend
            pm2 save

            echo "=== Smoke testing services ==="
            curl --fail --silent --show-error http://127.0.0.1:3000/ > /dev/null
            curl --fail --silent --show-error http://127.0.0.1:4000/health > /dev/null

            echo "=== Deployment complete ==="
